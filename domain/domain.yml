version: "3.1"

slots:
  snap_eligible:
    type: bool
    mappings:
      - type: controlled

  household_size:
    type: text
    mappings:
      - type: from_llm

  monthly_income:
    type: float
    mappings:
      - type: from_llm

  selected_appointment_slot:
    type: text
    mappings:
      - type: controlled

  user_confirmation:
    type: bool
    mappings:
      - type: from_llm

  user_email:
    type: text
    mappings:
      - type: from_llm

  appointment_confirmed:
    type: bool
    mappings:
      - type: controlled

responses:
  utter_ask_household_size:
    - text: "How many people are in your household?"

  utter_ask_monthly_income:
    - text: "What is your total monthly gross household income (in dollars)?"

  utter_snap_eligible:
    - text: "Based on the information you provided (household size: {household_size}, monthly income: {monthly_income} dollars), you may be eligible for SNAP benefits.\n\nApply online through [Georgia Gateway](https://gateway.ga.gov/), or I can help you schedule a DFCS office appointment."

  utter_snap_not_eligible:
    - text: "Based on the information you provided (household size: {household_size}, monthly income: {monthly_income} dollars), you may not qualify for SNAP benefits. However, eligibility depends on additional factors.\n\nLearn more about [SNAP eligibility](https://dfcs.georgia.gov/services/supplemental-nutrition-assistance-program-snap).\n\nYou can also schedule a DFCS office appointment to discuss your situation — I can help with that."

  utter_snap_general_info:
    - text: "SNAP (Supplemental Nutrition Assistance Program), also known as food stamps, helps low-income individuals and families buy food. In Georgia, SNAP is administered by the Division of Family and Children Services (DFCS).\n\nLearn more or apply online at [Georgia Gateway](https://gateway.ga.gov/).\n\nI can also help you check your eligibility or schedule a DFCS office appointment."

  utter_ask_user_email:
    - text: "What email address should we send the appointment confirmation to?"

  utter_ask_user_confirmation:
    - text: "Are you sure you want to book the {selected_appointment_slot} appointment?"
      buttons:
        - payload: "/SetSlots(user_confirmation=true)"
          title: "Yes"
        - payload: "/SetSlots(user_confirmation=false)"
          title: "No, cancel"

  utter_cancelling:
    - text: "Okay, I won't book that appointment."

  utter_appointment_confirmed:
    - text: "Your DFCS appointment has been booked for {selected_appointment_slot}. A confirmation has been sent to {user_email}. You'll visit your local DFCS office at that time to discuss your SNAP benefits."

  utter_unsupported_action:
    - text: "I'm sorry, that's not something I can help with right now. I can assist with SNAP benefits and scheduling DFCS appointments. For other Georgia services, call 1-800-GEORGIA (1-800-436-7442)."

  utter_free_chitchat_response:
    - text: "I'm here to help with Georgia SNAP benefits and DFCS appointment scheduling. What can I do for you?"
