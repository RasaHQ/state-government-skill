test_cases:
  - test_case: new user explores then checks license
    steps:
      - user: "hello"
      - utter: utter_greeting
      - user: "what can you help me with?"
      - utter: utter_what_can_you_do
      - user: "how do I renew my license?"
      - utter: utter_license_renew_info
      - user: "thanks"
      - utter: utter_free_chitchat_response
      - user: "bye"
      - utter: utter_goodbye

  - test_case: user asks about SNAP then says ok
    steps:
      - user: "tell me about food stamps"
      - utter: utter_snap_general_info
      - user: "ok"
      - utter: utter_free_chitchat_response

  - test_case: user asks about unsupported service then asks about supported one
    steps:
      - user: "hi"
      - utter: utter_greeting
      - user: "can you help me register my car?"
      - utter: utter_unsupported_action
      - user: "what about renewing my driver's license?"
      - utter: utter_license_renew_info
